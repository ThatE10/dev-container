name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Smoke test (runs on every push/PR, no GPU needed) ─────────────
  # Builds only the `smoke-test` stage (python:3.12-slim base, ~200MB).
  # Validates that our requirements.txt packages install and import correctly.
  # The heavy vLLM base image is NOT pulled here.
  smoke-test:
    name: Smoke test (no GPU)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build smoke-test stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: smoke-test
          push: false
          load: true
          tags: dev-container:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Python imports
        # sae_lens / peft / trl require torch — tested in the full GPU image only.
        # This stage covers everything in requirements-smoke.txt.
        run: |
          docker run --rm dev-container:smoke-test python -c "
          import importlib, sys

          packages = {
              'plotly':     'plotly',
              'marimo':     'marimo',
              'modal':      'modal',
              'jupyterlab': 'jupyterlab',
              'black':      'black',
              'ruff':       'ruff',
              'pytest':     'pytest',
              'rich':       'rich',
          }

          failed = []
          for mod, pkg in packages.items():
              try:
                  m = importlib.import_module(mod)
                  ver = getattr(m, '__version__', 'unknown')
                  print(f'  OK  {pkg} ({ver})')
              except ImportError as e:
                  print(f'  FAIL {pkg}: {e}')
                  failed.append(pkg)

          if failed:
              print(f'FAILED: {failed}', file=sys.stderr)
              sys.exit(1)
          print('All smoke-test imports passed')
          "

      - name: Verify Jupyter kernel registration
        run: |
          docker run --rm dev-container:smoke-test bash -c "
            python -m ipykernel install --name test-kernel --display-name 'Test'
            jupyter kernelspec list | grep test-kernel
            echo 'kernel registration OK'
          "

      - name: Verify Marimo CLI
        run: |
          docker run --rm dev-container:smoke-test marimo --version

      - name: Verify entrypoint scripts are valid bash
        run: |
          docker run --rm dev-container:smoke-test bash -c "
            apt-get install -y -q bash 2>/dev/null || true
          "
          # Lint scripts locally (bash is available on the runner)
          bash -n scripts/entrypoint.sh
          bash -n scripts/import-secrets.sh
          echo 'Script syntax OK'

  # ── Job 2: Full image build → ghcr.io (main branch only) ─────────────────
  # Pulls the full vLLM base image (~20GB). Runs on merge to main.
  # Uses registry-based layer cache to avoid re-downloading the base each run.
  #
  # For GPU validation, set up a self-hosted runner:
  #   runs-on: [self-hosted, gpu]
  # and add "--gpus all" to the docker run test below.
  build-and-push:
    name: Build full image & push to ghcr.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: smoke-test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Free runner disk space
        run: |
          # Remove pre-installed SDKs that eat ~10GB on ubuntu-latest
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/lib/jvm
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker image tags must be lowercase; github.repository preserves case (ThatE10/...)
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Registry cache avoids re-pulling the vLLM base on every run
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Test full image imports (no GPU)
        run: |
          docker run --rm ${{ env.IMAGE }}:${{ github.sha }} python -c "
          import torch, transformers, vllm, plotly, marimo, modal, sae_lens
          print(f'torch       {torch.__version__}')
          print(f'transformers {transformers.__version__}')
          print(f'vllm        {vllm.__version__}')
          print(f'plotly      {plotly.__version__}')
          print(f'marimo      {marimo.__version__}')
          print('Full image imports OK')
          "

      - name: Verify Jupyter kernelspec
        run: |
          docker run --rm ${{ env.IMAGE }}:${{ github.sha }} jupyter kernelspec list
